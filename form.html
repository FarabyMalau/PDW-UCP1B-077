<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Tech Community - Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="./index.html">Home</a>
        <a href="./form.html">Join Us</a>
        <a href="./gallery.html">Multimedia</a>
    </nav>

    <div class="container">
        <h2>Pendaftaran Anggota Baru</h2>
        <p>Silakan isi data di bawah ini untuk bergabung dengan Tech Community.</p>
        <hr>

        <form id="registrationForm">
            <label for="name">Nama Lengkap:</label>
            <input type="text" id="name" name="name" placeholder="Masukkan nama lengkap" required>

            <label for="email">Alamat Email:</label>
            <input type="email" id="email" name="email" placeholder="contoh@email.com" required>

            <label for="interest">Bidang Minat:</label>
            <select id="interest" name="interest" required>
                <option value="" disabled selected>-- Pilih Bidang --</option>
                <option value="Web Development">Web Development</option>
                <option value="Mobile Development">Mobile Development</option>
                <option value="Data Science">Data Science</option>
                <option value="Cyber Security">Cyber Security</option>
                <option value="Artificial Intelligence">Artificial Intelligence</option>
            </select>

            <button type="submit" id="submitBtn">Daftar Sekarang</button>
        </form>

        <div id="result" style="margin-top: 20px; padding: 10px; border-left: 5px solid #27ae60; background: #e8f6ef; display: none;">
            <h3>Berhasil Terdaftar!</h3>
            <p id="outputData"></p>
        </div>

        <div style="margin-top: 20px;">
            <a href="./index.html" style="color: #3498db; text-decoration: none;">&larr; Kembali ke Halaman Utama</a>
        </div>
    </div>

    <script src="script.js"></script>
    
    <script>
        // Logika tambahan khusus untuk menampilkan area hasil (result)
        const form = document.getElementById('registrationForm');
        const resultDiv = document.getElementById('result');
        const outputText = document.getElementById('outputData');

        form.addEventListener('submit', function() {
            const name = document.getElementById('name').value;
            const interest = document.getElementById('interest').value;
            
            // Menampilkan bagian result yang tadinya tersembunyi
            resultDiv.style.display = 'block';
            outputText.innerText = `Terima kasih ${name}, minat Anda pada bidang ${interest} telah kami simpan sementara dalam sistem.`;
        });
    </script>
</body>
</html>
